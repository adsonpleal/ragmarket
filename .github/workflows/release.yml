name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (tag) ex.: v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Pré-release?"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches package.json
        shell: pwsh
        run: |
          $tag = "${{ inputs.version }}".TrimStart("v")
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            Write-Error "Version mismatch: input='$tag' vs package.json='$pkg'"
            exit 1
          }
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($tag -ne $cargo) {
            Write-Error "Version mismatch: input='$tag' vs Cargo.toml='$cargo'"
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust (stable MSVC)
        id: rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ steps.rust.outputs.cachekey }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.rust.outputs.cachekey }}-
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Verify WinDivert binaries present
        shell: pwsh
        run: |
          $required = @(
            "src-tauri/resources/x64/WinDivert.dll",
            "src-tauri/resources/x64/WinDivert.lib",
            "src-tauri/resources/x64/WinDivert64.sys"
          )
          foreach ($f in $required) {
            if (-not (Test-Path $f)) {
              Write-Error "Missing: $f"
              exit 1
            }
            Write-Output "OK: $f"
          }

      - name: Run unit tests
        run: npm test

      - name: Build Tauri (release)
        run: npm run tauri build

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          # Single NSIS installer that bundles WinDivert.dll + WinDivert64.sys.
          $installers = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe -ErrorAction SilentlyContinue
          if (-not $installers) {
            Write-Error "No NSIS installer found in src-tauri/target/release/bundle/nsis/"
            exit 1
          }
          foreach ($f in $installers) {
            $dst = "ragmarket-${{ inputs.version }}-setup.exe"
            Copy-Item $f.FullName "artifacts/$dst"
          }
          Write-Output "=== Release artifacts ==="
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          Push-Location artifacts
          Get-ChildItem -File | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)"
          } | Set-Content -Path SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt
          Pop-Location

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".TrimStart("v")
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\][^\n]*\n(.*?)(?=^## \[|\Z)"
          $m = [regex]::Match($content, $pattern)
          $body = if ($m.Success) { $m.Groups[1].Value.Trim() } else { "Veja o CHANGELOG.md para detalhes." }
          # Strip carriage returns left over from Windows line endings
          $body = $body -replace "`r", ""
          $tmp = New-TemporaryFile
          Set-Content -Path $tmp -Value $body -Encoding utf8
          Write-Output "body_file=$tmp" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        # Pinned to v2.2.1 commit for supply-chain safety (this job has
        # contents:write). Update both the tag and the SHA when upgrading.
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body_path: ${{ steps.notes.outputs.body_file }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/*
